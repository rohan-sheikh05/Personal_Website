<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no" />
  <meta name="theme-color" content="#000000" />

  <!-- Primary SEO tags: written to match how people actually search for you -->
  <title>Rohan Sheikh – BUET MME Student | Robotics, Research & Entrepreneurship</title>
  <meta name="description" content="Rohan Sheikh is a Materials and Metallurgical Engineering (MME) student at BUET (Bangladesh University of Engineering and Technology), working in robotics, research, and entrepreneurship in Dhaka, Bangladesh." />
  <link rel="canonical" href="https://rohansheikh.dpdns.org/" />

  <!-- Open Graph: controls the preview card when your link is shared on WhatsApp, LinkedIn, Facebook, etc. -->
  <meta property="og:title" content="Rohan Sheikh – BUET MME Student" />
  <meta property="og:description" content="Portfolio of Rohan Sheikh — BUET (MME) student, robotics competitor, researcher, and entrepreneur." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://rohansheikh.dpdns.org/" />
  <meta property="og:image" content="https://rohansheikh.dpdns.org/pic1.jpeg" />

  <!-- Twitter/X card (same purpose as Open Graph, different platform) -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Rohan Sheikh – BUET MME Student" />
  <meta name="twitter:description" content="Portfolio of Rohan Sheikh — BUET (MME) student, robotics competitor, researcher, and entrepreneur." />
  <meta name="twitter:image" content="https://rohansheikh.dpdns.org/pic1.jpeg" />

  <!-- Structured data: explicitly tells Google "this page IS a person named Rohan Sheikh" -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Rohan Sheikh",
    "url": "https://rohansheikh.dpdns.org/",
    "description": "Materials and Metallurgical Engineering (MME) student at BUET, robotics competitor, researcher, and entrepreneur.",
    "affiliation": {
      "@type": "CollegeOrUniversity",
      "name": "Bangladesh University of Engineering and Technology (BUET)"
    },
    "alumniOf": {
      "@type": "CollegeOrUniversity",
      "name": "Bangladesh University of Engineering and Technology (BUET)"
    },
    "sameAs": [
      "https://www.linkedin.com/in/rohan-sheikh/",
      "https://github.com/rohan-sheikh05"
    ]
  }
  </script>

  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico" />
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
</body>
</html>
